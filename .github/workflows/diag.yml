name: Diagnose Release API
on:
  workflow_dispatch:

jobs:
  matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22, 24]
    name: node-${{ matrix.node }}
    steps:
      - name: Setup node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Baseline repro with auto's octokit@18 stack
        env:
          TOKEN: ${{ secrets.FRONTEND_GH_TOKEN }}
        run: |
          node --version
          mkdir -p /tmp/repro && cd /tmp/repro
          npm init -y >/dev/null 2>&1
          npm i @octokit/rest@18.12.0 @octokit/plugin-retry@3.0.9 @octokit/plugin-throttling@3.7.0 >/dev/null 2>&1
          node -e "console.log('node-fetch:', require('@octokit/request/node_modules/node-fetch/package.json')?.version || require('node-fetch/package.json').version)" 2>/dev/null || true
          cat > repro.mjs <<'EOF'
          import { Octokit } from "@octokit/rest";
          import { retry } from "@octokit/plugin-retry";
          import { throttling } from "@octokit/plugin-throttling";
          const GitHub = Octokit.plugin(retry, throttling);
          const gh = new GitHub({
            auth: process.env.TOKEN,
            previews: ["symmetra-preview"],
            throttle: { onRateLimit: () => true, onAbuseLimit: () => true },
          });
          let ok = 0, fail = 0, lastErr = "";
          for (let i = 0; i < 5; i++) {
            try { await gh.repos.get({ owner: "magiclabs", repo: "magic-js" }); ok++; }
            catch (e) { fail++; lastErr = e.message; }
          }
          console.log(`RESULT node=${process.version} ok=${ok} fail=${fail} ${fail ? "lastErr=" + lastErr : ""}`);
          EOF
          node repro.mjs
